# gauntlet-java — the java language-profile Gauntlet gates (reusable workflow).
#
# Called from the consumer wrapper alongside gauntlet-core.yml; each job is a
# required check (context "java / <job>"). Gate logic lives in the consumer's
# pinned Gradle build (installed by `crucible init --lang java`); these jobs
# are thin invocations.
#
# v1 note: jobs run on pinned setup-java/setup-gradle rather than the
# crucible-toolchain container (GHCR publish pending); versions match the
# image's pins. Container jobs are a drop-in upgrade later.

name: gauntlet-java
on:
  workflow_call:
    secrets:
      NVD_API_KEY:
        required: false # dependency-check is slow without it; set when available

permissions:
  contents: read

env:
  GRADLE_VERSION: "9.6.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - run: gradle --no-daemon classes testClasses # compile + Error Prone -Werror

  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - run: gradle --no-daemon spotlessCheck checkstyleMain checkstyleTest

  archunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - run: gradle --no-daemon :oracles:test --tests 'crucible.*'

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - run: gradle --no-daemon test # full suite incl. /oracles (fixed jqwik seed via CI env)

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - run: gradle --no-daemon :app:pitest # threshold from the pinned build (75, ratcheted via PR)

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Semgrep (pinned)
        run: |
          python3 -m pip install --quiet semgrep==1.169.0
          semgrep scan --error --metrics=off \
            --config p/java \
            --config ci/semgrep/custom.yml

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with: { gradle-version: "9.6.1" }
      - name: Allowlist check (every runtime group must be allowlisted)
        run: |
          gradle --no-daemon -q :app:dependencies --configuration runtimeClasspath \
            | grep -oP '(?<=[-+]--- )[a-zA-Z0-9_.-]+(?=:)' | sort -u > /tmp/groups.txt
          violations=0
          while read -r group; do
            [ -z "$group" ] && continue
            if ! grep -qE "^\s*-\s+${group}(\s|$)" ci/dependency-allowlist.yml; then
              echo "::error::dependency group not allowlisted: $group (add via reviewed PR to ci/dependency-allowlist.yml)"
              violations=1
            fi
          done < /tmp/groups.txt
          exit $violations
      - name: OWASP dependency-check (fail on CVSS >= 7)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: gradle --no-daemon dependencyCheckAnalyze
