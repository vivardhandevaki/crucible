# harness-evals — the pipeline eval suite as a regression gate (impl plan §6.1).
#
# Runs the STATIC tier (deterministic, no Docker/token/LLM) on every PR that
# touches the harness: a change to a prompt, skill, rubric, sandbox setting,
# toolchain pin, or the CLI must keep the benchmark scorecard green.
#
# Trigger policy (§6.1): non-blocking at first — this job is NOT yet in the
# branch-protection required checks (settings/branch-protection.json). It is
# added there only after calibration (see CALIBRATION.md), at which point a red
# scorecard blocks merge.
name: harness-evals
on:
  pull_request:
    paths:
      - "prompts/**"
      - "skills/**"
      - "rubric/**"
      - "sandbox/**"
      - "toolchain/**"        # includes versions.lock.md — the pinned model/tool versions
      - "packages/cli/**"
      - "evals/**"
      - ".github/workflows/harness-evals.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  harness-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.23.1"
      - name: Build crucible CLI
        working-directory: packages/cli
        run: npm ci --no-fund --no-audit && npm run build
      - name: Run the eval scorecard (static tier)
        run: node packages/cli/dist/index.js eval run
