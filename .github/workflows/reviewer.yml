# reviewer — the reviewer agent as a REQUIRED status check (reusable workflow).
#
# Independence by construction (D-09): the job sees the diff, spec deltas,
# oracles.md, and the rubric — never the implementer's transcript. Malformed
# verdict JSON = FAIL (fail-closed, enforced by `crucible review`).
# Consumers pass ANTHROPIC_API_KEY as a secret; verdict is posted as a check
# (this job) and a PR comment (human-readable table).

name: reviewer
on:
  workflow_call:
    inputs:
      crucible-ref:
        description: Framework ref (pin a tag)
        type: string
        default: main
      model:
        description: Reviewer model (keep distinct from the implementer where possible)
        type: string
        default: claude-sonnet-4-6
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write # auto-merge enablement
  pull-requests: write

jobs:
  reviewer-verdict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: vivardhandevaki/crucible
          ref: ${{ inputs.crucible-ref }}
          path: .crucible
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.23.1"
      - name: Build crucible CLI + install agent runtime
        run: |
          (cd .crucible/packages/cli && npm ci --no-fund --no-audit && npm run build)
          npm install -g --no-fund --no-audit @anthropic-ai/claude-code@2.1.207
      - name: Reviewer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/pr-body.txt
          node .crucible/packages/cli/dist/index.js review \
            --base "origin/${{ github.base_ref }}" \
            --pr-body-file /tmp/pr-body.txt \
            --model "${{ inputs.model }}" \
            --out review-verdict.json
      - name: Post verdict as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f review-verdict.json ]; then
            {
              echo "## Reviewer verdict: $(jq -r .overall review-verdict.json)"
              echo ""
              echo "| Item | Verdict | Evidence |"
              echo "|---|---|---|"
              jq -r '.items[] | "| \(.id) | \(.verdict) | \(.evidence | gsub("\\|"; "\\\\|") | gsub("\n"; " ")) |"' review-verdict.json
            } > /tmp/comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md || true
          fi
      - name: Route (deterministic; applies labels + auto-merge or review request)
        # Runs only when the verdict check itself passed (PASS/FLAG). A FAIL
        # verdict red-checks the PR; routing is moot.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node .crucible/packages/cli/dist/index.js route \
            --base "origin/${{ github.base_ref }}" \
            --verdict review-verdict.json \
            --pr "${{ github.event.pull_request.number }}" \
            --apply
